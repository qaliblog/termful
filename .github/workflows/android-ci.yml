name: Android CI

on:
  push:
    branches: [ main, feature/agent-tabs ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 22.1.7171670

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download bootstrap packages
        run: ./gradlew downloadBootstraps --no-daemon

      - name: Lint check
        run: ./gradlew lintDebug --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run connected tests (if emulator available)
        if: false  # Disabled by default - enable if needed
        run: |
          # Setup emulator
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install 'system-images;android-29;google_apis;x86'
          echo "no" | $ANDROID_HOME/tools/bin/avdmanager create avd -n test -k 'system-images;android-29;google_apis;x86'
          $ANDROID_HOME/emulator/emulator -avd test -no-window -no-audio -no-boot-anim &
          ./gradlew connectedAndroidTest --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: build-artifacts
          path: |
            app/build/outputs/apk/debug/
            app/build/reports/
            app/build/test-results/

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Agent API rotation tests
        run: ./gradlew test --tests "*AgentProviderManagerTest*" --no-daemon

      - name: Run File Manager tests
        run: ./gradlew test --tests "*FileManagerTest*" --no-daemon

      - name: Run PTY separation tests
        run: ./gradlew test --tests "*SessionTabManagerTest*" --no-daemon

      - name: Generate test report
        if: always()
        run: ./gradlew testDebugUnitTestReport --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/

  security:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run security tests
        run: ./gradlew test --tests "*SecurityTest*" --no-daemon

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded API keys..."
          if grep -r -i "sk-" app/src/ --include="*.kt" --include="*.java" | grep -v "example\|test\|TODO"; then
            echo "WARNING: Potential hardcoded API keys found!"
            exit 1
          fi
          echo "No hardcoded secrets detected."

  integration:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Upload integration test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: integration-test-results
          path: |
            app/build/reports/integration-tests/
            app/build/test-results/integration/