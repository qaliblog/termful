name: Simple Termful Build

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'termful-shared/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        # Aggressively clear conflicting environment variables
        unset ANDROID_SDK_ROOT
        export ANDROID_SDK_ROOT=""
        echo "ANDROID_SDK_ROOT=" >> $GITHUB_ENV
        
        # Use existing Android SDK if available, otherwise install manually
        if [ -d "/usr/local/lib/android/sdk" ]; then
          echo "Using pre-installed Android SDK"
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          # Create local.properties to override any conflicting settings
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          
          # Install missing components if needed
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;22.1.7171670" 2>/dev/null || true
        else
          echo "Installing Android SDK manually"
          cd $HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          
          export ANDROID_HOME=$HOME/android-sdk
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          # Create local.properties to override any conflicting settings
          echo "sdk.dir=$HOME/android-sdk" > local.properties
          
          # Install SDK components
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;22.1.7171670"
        fi

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Debug environment before build
      run: |
        echo "=== Environment Check ==="
        echo "ANDROID_HOME: '$ANDROID_HOME'"
        echo "ANDROID_SDK_ROOT: '$ANDROID_SDK_ROOT'"
        echo "Contents of local.properties:"
        cat local.properties 2>/dev/null || echo "No local.properties file"
        echo "Working directory: $(pwd)"

    - name: Clean project and free space
      run: |
        # Clean project
        ./gradlew clean
        
        # Aggressive disk space cleanup
        sudo apt-get clean
        sudo apt-get autoremove -y
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
        # Remove non-Java toolchains only (preserve Java)
        sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/node
        sudo rm -rf /opt/hostedtoolcache/Python /opt/hostedtoolcache/PyPy /opt/hostedtoolcache/Ruby 
        sudo rm -rf /usr/local/lib/android/sdk/sources /usr/local/lib/android/sdk/docs
        sudo rm -rf /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
        docker system prune -af
        
        # Clear additional caches
        sudo rm -rf ~/.gradle/caches ~/.cache
        
        # Show available space
        echo "=== Disk space after cleanup ==="
        df -h

    - name: Download Alpine rootfs
      run: ./gradlew downloadBootstraps --info

    - name: Build debug APK
      run: |
        # Build debug with memory constraints
        ./gradlew assembleDebug --stacktrace --no-daemon --max-workers=2
      env:
        GRADLE_OPTS: "-Xmx2048m -Dfile.encoding=UTF-8"

    - name: Collect build artifacts
      run: |
        mkdir -p build-output
        find app/build/outputs/apk -name "*.apk" -exec cp {} build-output/ \;
        
        echo "## Build Summary" > build-output/BUILD_SUMMARY.md
        echo "- **Date:** $(date)" >> build-output/BUILD_SUMMARY.md
        echo "- **Commit:** ${{ github.sha }}" >> build-output/BUILD_SUMMARY.md
        echo "- **Branch:** ${{ github.ref_name }}" >> build-output/BUILD_SUMMARY.md
        echo "- **Alpine Version:** v3.19" >> build-output/BUILD_SUMMARY.md
        echo "" >> build-output/BUILD_SUMMARY.md
        echo "### APK Files:" >> build-output/BUILD_SUMMARY.md
        ls -la build-output/*.apk >> build-output/BUILD_SUMMARY.md 2>/dev/null || echo "No APK files found" >> build-output/BUILD_SUMMARY.md

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: termful-apks
        path: build-output/
        retention-days: 30

    - name: Update termful branch
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Check if termful branch exists
        git fetch origin
        if git show-ref --verify --quiet refs/remotes/origin/termful; then
          git checkout termful
          git merge origin/${{ github.ref_name }} --no-edit -m "Auto-merge from ${{ github.ref_name }} - $(date)"
        else
          git checkout -b termful
          git commit --allow-empty -m "Initial termful branch - $(date)"
        fi
        
        # Update branch info
        echo "Last updated: $(date)" > LAST_BUILD.txt
        echo "Commit: ${{ github.sha }}" >> LAST_BUILD.txt
        echo "Workflow: ${{ github.run_id }}" >> LAST_BUILD.txt
        
        git add LAST_BUILD.txt
        git commit -m "Update build info - $(date)" || echo "No changes"
        git push origin termful