name: Release Only Build

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [ termful ]

jobs:
  release-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Free up maximum disk space
      run: |
        # Show initial disk usage
        echo "=== Initial disk usage ==="
        df -h
        
        # Remove unnecessary packages and files
        sudo apt-get remove -y '^llvm-.*' '^libllvm.*' azure-cli google-cloud-cli
        sudo apt-get autoremove -y
        sudo apt-get clean
        
        # Remove large development environments
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        
        # Remove Android SDK documentation and sources
        sudo rm -rf /usr/local/lib/android/sdk/sources
        sudo rm -rf /usr/local/lib/android/sdk/docs
        sudo rm -rf /usr/local/lib/android/sdk/extras
        
        # Clear Docker and system caches
        docker system prune -af
        sudo rm -rf ~/.gradle/caches ~/.cache
        
        # Show final disk usage
        echo "=== Disk usage after cleanup ==="
        df -h

    - name: Setup Android SDK
      run: |
        # Clear conflicting environment variables
        unset ANDROID_SDK_ROOT
        export ANDROID_SDK_ROOT=""
        echo "ANDROID_SDK_ROOT=" >> $GITHUB_ENV
        
        # Use existing Android SDK
        export ANDROID_HOME=/usr/local/lib/android/sdk
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Create local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
        
        # Install only essential components
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;22.1.7171670" 2>/dev/null || true

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Clean project thoroughly
      run: |
        ./gradlew clean
        # Remove any existing build outputs
        rm -rf app/build termful-shared/build terminal-emulator/build terminal-view/build
        rm -rf .gradle/build-cache

    - name: Download Alpine rootfs (cached)
      run: ./gradlew downloadBootstraps --info

    - name: Monitor disk space before build
      run: |
        echo "=== Disk space before release build ==="
        df -h
        echo "=== Gradle cache size ==="
        du -sh .gradle/ 2>/dev/null || echo "No .gradle directory"

    - name: Build release APK only
      run: |
        # Build release with minimal memory usage
        ./gradlew assembleRelease --stacktrace --no-daemon --max-workers=2
      env:
        GRADLE_OPTS: "-Xmx2048m -Dfile.encoding=UTF-8"

    - name: Verify APK creation
      run: |
        echo "=== APK files created ==="
        find app/build/outputs/apk -name "*.apk" -ls 2>/dev/null || echo "No APKs found"
        
        echo "=== Final disk usage ==="
        df -h

    - name: Collect release artifacts
      run: |
        mkdir -p release-output
        find app/build/outputs/apk/release -name "*.apk" -exec cp {} release-output/ \; 2>/dev/null || echo "No release APKs found"
        
        # Create build info
        echo "# Termful Release Build" > release-output/BUILD_INFO.md
        echo "- **Date**: $(date)" >> release-output/BUILD_INFO.md
        echo "- **Commit**: ${{ github.sha }}" >> release-output/BUILD_INFO.md
        echo "- **Alpine Version**: 3.20.7" >> release-output/BUILD_INFO.md
        echo "- **Package**: com.termful" >> release-output/BUILD_INFO.md
        echo "- **Architectures**: aarch64, armv7, x86, x86_64" >> release-output/BUILD_INFO.md
        
        # List APK files
        if ls release-output/*.apk 1> /dev/null 2>&1; then
          echo "## APK Files:" >> release-output/BUILD_INFO.md
          ls -lh release-output/*.apk >> release-output/BUILD_INFO.md
        fi

    - name: Upload release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: termful-release-apk
        path: release-output/
        retention-days: 30

    - name: Build success summary
      if: success()
      run: |
        echo "🎉 SUCCESS! Termful APK built with Alpine Linux 3.20.7!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🏔️ Alpine Linux Integration Complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Alpine Linux 3.20.7" >> $GITHUB_STEP_SUMMARY  
        echo "- **Package Manager**: APK (Alpine Package Keeper)" >> $GITHUB_STEP_SUMMARY
        echo "- **Architectures**: All supported (aarch64, armv7, x86, x86_64)" >> $GITHUB_STEP_SUMMARY
        echo "- **Size**: Minimal security-focused environment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 Mission Accomplished" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ App renamed to com.termful" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Termux bootstrap replaced with Alpine Linux" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Terminal working with Alpine on all architectures" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🚀 **Termful APK ready for use!**" >> $GITHUB_STEP_SUMMARY