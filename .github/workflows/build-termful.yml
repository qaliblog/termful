name: Build Termful App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for proper git operations

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk-version: 22.1.7171670

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Alpine rootfs downloads
      uses: actions/cache@v3
      with:
        path: |
          app/src/main/cpp/alpine-minirootfs-*.tar.gz
          app/src/main/cpp/bootstrap-*.zip
        key: alpine-rootfs-v3.19-${{ hashFiles('app/build.gradle') }}
        restore-keys: |
          alpine-rootfs-v3.19-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Download Alpine Linux rootfs
      run: ./gradlew downloadBootstraps

    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build release APK  
      run: ./gradlew assembleRelease --stacktrace

    - name: Create build info
      run: |
        echo "Build Date: $(date)" > build-info.txt
        echo "Commit: ${{ github.sha }}" >> build-info.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info.txt
        echo "Alpine Version: v3.19" >> build-info.txt
        echo "Package Variant: apk-android-7" >> build-info.txt

    - name: Upload debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: termful-debug-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          build-info.txt
        retention-days: 30

    - name: Upload release APK artifact  
      uses: actions/upload-artifact@v4
      with:
        name: termful-release-apk
        path: |
          app/build/outputs/apk/release/*.apk
          build-info.txt
        retention-days: 90

    - name: Create release branch and push
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Create timestamp for branch name
        TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
        BRANCH_NAME="release/termful-build-${TIMESTAMP}"
        
        # Create and switch to new branch
        git checkout -b "${BRANCH_NAME}"
        
        # Add build artifacts to git (if they don't exceed size limits)
        mkdir -p releases
        cp app/build/outputs/apk/debug/*.apk releases/ 2>/dev/null || true
        cp app/build/outputs/apk/release/*.apk releases/ 2>/dev/null || true
        cp build-info.txt releases/ 2>/dev/null || true
        
        # Add and commit changes
        git add -A
        git commit -m "🚀 Termful build ${TIMESTAMP}

        - Built from commit: ${{ github.sha }}
        - Alpine Linux v3.19 rootfs
        - Package variant: apk-android-7
        - All architectures: aarch64, armv7, x86, x86_64
        - Debug and Release APKs generated
        
        Generated by GitHub Actions workflow" || echo "No changes to commit"
        
        # Push the new branch
        git push origin "${BRANCH_NAME}"
        
        echo "Created and pushed branch: ${BRANCH_NAME}"

  test-basic:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Run unit tests
      run: ./gradlew test --stacktrace

    - name: Run lint checks
      run: ./gradlew lint --stacktrace

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/build/reports/tests/**
          **/build/reports/lint-results*
        retention-days: 7